{% extends "base.html" %}

{% block title %}Admin Login - Online Voting System{% endblock %}

{% block content %}
    <h1>Admin Login</h1>

    {% set error_message = error if error else None %}
    {% include 'partials/flash_messages.html' %}

    <form action="/auth/admin-login" method="POST" class="auth-form" novalidate>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required aria-required="true" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required aria-required="true" autocomplete="current-password">
        </div>
        <button type="submit">Login</button>
    </form>
{% endblock %}
