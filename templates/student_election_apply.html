{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>Apply as Candidate</h1>
    <div class="card">
        <div class="card-header">
            <h3>Election: {{ election.title }}</h3>
        </div>
        <div class="card-body">
            <form action="/candidates/apply" method="POST">
                <input type="hidden" name="election_id" value="{{ election.id }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="form-group">
                    <label for="manifesto">Candidate Manifesto</label>
                    <p class="text-muted">Describe your goals, vision, and why students should vote for you.</p>
                    <textarea id="manifesto" name="manifesto" class="form-control" rows="10" required placeholder="Enter your manifesto here..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Submit Application</button>
                    <a href="/student/elections" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
