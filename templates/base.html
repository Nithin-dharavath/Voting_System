<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Voting System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="{% if request.state.user %}{{ request.state.user.role.lower() }}-auth {% endif %}">
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">Voting System</a>
            <div class="nav-links">
                {% if request.state.user %}
                    <a href="{{ '/admin/dashboard' if request.state.user.role == 'ADMIN' else '/student/dashboard' }}">Dashboard</a>
                    <a href="/profile">Profile</a>
                    <button id="nav-edit-profile-btn" class="nav-edit-btn hidden" onclick="toggleEditMode()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3l4 4-4 4"/><path d="M21 6H3"/><path d="M17 21l-4-4 4-4"/><path d="M3 18h18"/></svg>
                        Edit Profile
                    </button>
                    <a href="/auth/logout" class="btn-logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                    <a href="/register" class="btn-register">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div id="toast-notification" class="toast hidden"></div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', path='/js/main.js') }}"></script>
</body>
</html>
