<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Voting System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% if request.state.user %}{{ request.state.user.role.lower() }}-auth {% endif %}">
    <a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:0;z-index:9999;padding:0.5rem 1rem;background:#0f172a;color:white;text-decoration:none;">Skip to main content</a>
    {% include 'partials/navbar.html' %}
    <div id="toast-notification" class="toast hidden" role="status" aria-live="polite"></div>
    <main id="main-content" class="container" role="main">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
