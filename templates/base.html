<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Voting System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="{% if request.state.user %}{{ request.state.user.role.lower() }}-auth {% endif %}">
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">Voting System</a>
            <div class="nav-links">
                {% if request.state.user %}
                    <a href="{{ '/admin/dashboard' if request.state.user.role == 'ADMIN' else '/student/dashboard' }}">Dashboard</a>
                    <a href="/profile">Profile</a>
                    <a href="/auth/logout" class="btn-logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                    <a href="/register" class="btn-register">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div id="toast-notification" class="toast hidden"></div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', path='/js/main.js') }}"></script>
</body>
</html>
